<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/0e17cc80b3.js" crossorigin="anonymous"></script>
    <title>Airbnb</title>
    <link rel="stylesheet" href="Airbnb.css">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTjbS8r6aYVxWtur4DRqzLE-n1TiR5ngC4-bg&s">
</head>
<body>
    <div class="header">
        <img src="https://download.logo.wine/logo/Airbnb/Airbnb-Logo.wine.png" alt="logo">
        <div class="house"><img src="house.png" alt="house"><span style="position: absolute; left:152%; top: 15%; font-weight: 500;">Homes</span></div>
        <div class="experience"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS5OO-pwhd7CRNDToA-q-nOB6ABYMlB24wIFQ&s" alt="experience"><span style="position: absolute; left:135%; top: 15%; font-weight: 500;">Experiences</span></div>
        <div class="services"><img src="bell.png" alt="services"><span style="position: absolute; left:139%; top: 15%; font-weight: 500;">Services</span>
        </div>
        <div class="host">Become a host</div>
        <div class="globe">
            <i class="fa-sharp fa-solid fa-globe fa-sm"></i>
        </div>
        <div class="grid">
            <i class="fa-sharp fa-solid fa-grip-lines"></i>
        </div>
        <div class="box">
            <div class="dest">
                <button>   
                    Where <br>
                    <span style="color: rgba(0, 0, 0, 0.425);">search Destinations</span> 
                </button>
            </div>
            <div class="when">
                <button>   
                    When <br>
                    <span style="color: rgba(0, 0, 0, 0.425);">Add dates</span> 
                </button>
            </div>
            
            <div class="who">
                <button>   
                    Who <br>
                    <span style="color: rgba(0, 0, 0, 0.425);">Add guests</span>   
                </button>
            </div>
            <div class="search">
                <button><i class="fa-solid fa-magnifying-glass fa-xl" style="color: rgb(255, 255, 255);"></i></button>
            </div>

    
            
        </div>
            
    
        
    </div>
    
</body>
</html>
