<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/0e17cc80b3.js" crossorigin="anonymous"></script>
    <title>Airbnb</title>
    <link rel="stylesheet" href="Airbnb.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTjbS8r6aYVxWtur4DRqzLE-n1TiR5ngC4-bg&s">
</head>
<body class="bg-[whitesmoke]">
    <div class="header bg-[white] h-[245px] relative flex shadow-[0_2px_5px_rgba(0,0,0,0.1)]">
        <img class="h-[90px] w-auto ml-[20px] transform scale-[1.2]" src="https://download.logo.wine/logo/Airbnb/Airbnb-Logo.wine.png" alt="logo">
        <div class="house absolute left-[32%] top-[15%] text-[20px] cursor-pointer"><img class="h-[23px] w-auto mr-[5px] transform scale-[2.9]" src="house.png" alt="house"><span style="position: absolute; left:152%; top: 15%; font-weight: 500;">Homes</span></div>
        <div class="experience absolute left-[45%] top-[15%] text-[20px] cursor-pointer"><img class="h-[20px] w-auto mr-[5px] transform scale-[2.9]" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS5OO-pwhd7CRNDToA-q-nOB6ABYMlB24wIFQ&s" alt="experience"><span style="position: absolute; left:135%; top: 15%; font-weight: 500;">Experiences</span></div>
        <div class="services absolute left-[60%] top-[15%] text-[20px] cursor-pointer"><img class="h-[23px] w-auto mr-[5px] transform scale-[2.3]" src="bell.png" alt="services"><span style="position: absolute; left:139%; top: 15%; font-weight: 500;">Services</span>
        </div>
        <div class="host absolute left-[80%] top-[17%] text-[15px] text-[rgba(0,0,0,0.623)] font-family-[sans-serif] font-weight-[700]">Become a host</div>
        <div class="globe absolute left-[90%] top-[16%] text-[20px] cursor-pointer">
            <i class="fa-sharp fa-solid fa-globe fa-sm"></i>
        </div>
        <div class="grid absolute left-[93%] top-[16%] text-[20px] cursor-pointer">
            <i class="fa-sharp fa-solid fa-grip-lines"></i>
        </div>
        <div class="box relative left-[9%] top-[45%] w-[60%] h-[68px] rounded-[35px] shadow-[3px_5px_10px_10px_rgba(0,0,0,0.1)]">
            <div class="dest">
                <button>   
                    Where <br>
                    <span style="color: rgba(0, 0, 0, 0.425);">search Destinations</span> 
                </button>
                
            </div>
            <div class="when">
                <button>   
                    When <br>
                    <span style="color: rgba(0, 0, 0, 0.425);">Add dates</span> 
                </button>
            </div>
            
            <div class="who">
                <button>   
                    Who <br>
                    <span style="color: rgba(0, 0, 0, 0.425);">Add guests</span>   
                </button>
            </div>
            <div class="search">
                <button><i class="fa-solid fa-magnifying-glass fa-xl" style="color: rgb(255, 255, 255);"></i></button>
            </div>

    
            
        </div>
            
    
        
    </div>
    
</body>
</html>
