<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/0e17cc80b3.js" crossorigin="anonymous"></script>
    <title>Airbnb</title>
    <link rel="stylesheet" href="idk.css">
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTjbS8r6aYVxWtur4DRqzLE-n1TiR5ngC4-bg&s">
</head>
<body>
    <div class="header">
        <img src="https://download.logo.wine/logo/Airbnb/Airbnb-Logo.wine.png" alt="logo">
        <div class="house"><a href="#"><i class="fa-sharp fa-solid fa-house fa-lg"></i>Homes</a></div>
        <div class="experience"><a href="#"><i class="fa-sharp fa-solid fa-star fa-lg"></i>Experiences</a></div>
        <div class="services"><a href="#"><i class="fa-sharp fa-solid fa-concierge-bell fa-lg"></i>Services</a></div>
        <div class="host">Become a host</div>
        <div class="globe">
            <i class="fa-sharp fa-solid fa-globe fa-sm"></i>
        </div>
        <div class="grid">
            <i class="fa-sharp fa-solid fa-grip-lines"></i>
        </div>
        <div class="box">
            <div class="dest">
                <button>   
                    Where <br>
                    <span style="color: rgba(0, 0, 0, 0.425);">search Destinations</span> 
                </button>
            </div>
            <div class="when">
                <button>   
                    When <br>
                    <span style="color: rgba(0, 0, 0, 0.425);">Add dates</span> 
                </button>
            </div>
            
            <div class="who">
                <button>   
                    Who <br>
                    <span style="color: rgba(0, 0, 0, 0.425);">Add guests</span> 
                </button>
            </div>
            <div class="search">
                <button><i class="fa-solid fa-magnifying-glass fa-xl" style="color: rgb(255, 255, 255);"></i></button>
            </div>

            
            
        </div>
            
    
        
    </div>
    
</body>
</html>
